{% extends 'base.html' %}

{% block title %}Delete Task | TaskFlow{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-body text-center">
                <h1 class="card-title text-danger mb-4">Delete Task?</h1>
                <p class="lead">Are you sure you want to delete:</p>
                <p class="fs-4 fw-bold">{{ task.title }}</p>
                <p class="text-muted">This action cannot be undone.</p>

                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-lg me-2">
                        Yes, Delete
                    </button>
                    <a href="{% url 'tasks:task_list' %}" class="btn btn-secondary btn-lg">
                        Cancel
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
